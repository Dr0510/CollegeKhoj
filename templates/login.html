<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CollegeFind</title>
    <link href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){
            const t = localStorage.getItem('cf-theme') || 'dark';
            document.documentElement.setAttribute('data-bs-theme', t);
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        :root { --brand:#4f8ef7; }
        [data-theme="dark"]  { --bg:#0b1019; --card-bg:#161b27; --card-border:rgba(255,255,255,.07); --text:#e2e8f0; --text-muted:#8892a4; }
        [data-theme="light"] { --bg:#f0f4ff; --card-bg:#ffffff; --card-border:rgba(0,0,0,.09); --text:#1a202c; --text-muted:#4a5568; }
        *, *::before, *::after { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 40px; max-width: 420px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
        .brand { font-weight: 800; font-size: 1.6rem; color: var(--brand); margin-bottom: 6px; }
        .brand span { color: var(--text); }
        .subtitle { color: var(--text-muted); font-size: .92rem; margin-bottom: 32px; }
        #clerk-sign-in { display: flex; justify-content: center; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: .82rem; text-decoration: none; margin-top: 24px; transition: color .2s; }
        .back-link:hover { color: var(--brand); }
        .loading { color: var(--text-muted); font-size: .88rem; padding: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand"><i class="fas fa-graduation-cap me-2"></i>College<span>Find</span></div>
        <div class="subtitle">Sign in to save colleges, compare, and access your results anywhere</div>
        <div id="clerk-sign-in"><div class="loading"><i class="fas fa-spinner fa-spin me-2"></i>Loading...</div></div>
        <a href="{{ url_for('mhcet_page') }}" class="back-link"><i class="fas fa-arrow-left"></i> Continue without login</a>
    </div>

    <script>
        const PUBLISHABLE_KEY = "{{ clerk_publishable_key }}";
    </script>
    <script async crossorigin="anonymous"
            src="https://{{ clerk_frontend_api }}/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
            data-clerk-publishable-key="{{ clerk_publishable_key }}">
    </script>
    <script>
        window.addEventListener('load', async () => {
            try {
                await window.Clerk.load();
                const div = document.getElementById('clerk-sign-in');
                div.innerHTML = '';

                if (window.Clerk.user) {
                    await syncUser();
                    window.location.href = '{{ next_url or url_for("mhcet_page") }}';
                    return;
                }

                window.Clerk.mountSignIn(div, {
                    afterSignInUrl: '/auth/sync?next={{ next_url or url_for("mhcet_page") }}',
                    afterSignUpUrl: '/auth/sync?next={{ next_url or url_for("mhcet_page") }}'
                });
            } catch (e) {
                document.getElementById('clerk-sign-in').innerHTML =
                    '<p style="color:#ef4444;font-size:.85rem;">Could not load sign-in. Check that CLERK_PUBLISHABLE_KEY is set correctly.</p>';
            }
        });

        async function syncUser() {
            try {
                const token = await window.Clerk.session.getToken();
                await fetch('/auth/sync', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
                });
            } catch (e) { console.warn('Sync failed', e); }
        }
    </script>
</body>
</html>
