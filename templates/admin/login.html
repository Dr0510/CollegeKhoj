<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — CollegeKhoj</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f1117 0%, #1a1d29 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: #1e2130;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            margin-bottom: 12px;
        }
        .login-logo h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
        }
        .login-logo h1 em { color: #667eea; font-style: normal; }
        .login-logo p { color: #6c757d; font-size: 14px; }
        .form-control {
            background: #2a2d3a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            color: #fff;
            padding: 12px 16px;
        }
        .form-control:focus {
            background: #2a2d3a;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
            color: #fff;
        }
        .form-label { color: #a0a3b1; font-weight: 500; font-size: 14px; }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(102,126,234,0.3); }
        .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 12px; padding: 12px; color: #ef4444; font-size: 14px; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="icon"><i class="fas fa-graduation-cap"></i></div>
            <h1>College<em>Khoj</em></h1>
            <p>Admin Panel</p>
        </div>

        {% if error %}
        <div class="error-msg"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('admin_bp.admin_login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="next" value="{{ next_url }}">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="admin@collegekhoj.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-lock me-2"></i>Sign In</button>
        </form>
    </div>
</body>
</html>
